<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>NOCpulse</title>
    <script>
      try {
        var t = localStorage.getItem('nocpulse-theme') || 'dark';
        var r = document.documentElement;
        r.classList.remove('light','dark');
        if (t === 'system') {
          r.classList.add(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        } else {
          r.classList.add(t);
        }
      } catch(e) { document.documentElement.classList.add('dark'); }
    </script>
    <meta name="description" content="NOCpulse — built on Replit. Update this description to reflect the app." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="NOCpulse" />
    <meta property="og:description" content="NOCpulse — built on Replit. Update this description to reflect the app." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NOCpulse" />
    <meta name="twitter:description" content="NOCpulse — built on Replit. Update this description to reflect the app." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
