<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>NOCpulse</title>
    <script>
      try {
        var t = localStorage.getItem('nocpulse-theme') || 'dark';
        var r = document.documentElement;
        r.classList.remove('light','dark');
        if (t === 'system') {
          r.classList.add(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        } else {
          r.classList.add(t);
        }
      } catch(e) { document.documentElement.classList.add('dark'); }
    </script>
    <meta name="description" content="NOCpulse — Enterprise ISP Network Operations Centre. Monitor, analyze, and optimize your network in real time." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0b1628" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NOCpulse" />
    <meta property="og:title" content="NOCpulse" />
    <meta property="og:description" content="Enterprise ISP Network Operations Centre — Monitor, Analyze, Optimize." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/app-icon.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="NOCpulse" />
    <meta name="twitter:description" content="Enterprise ISP Network Operations Centre." />
    <meta name="twitter:image" content="/app-icon.png" />
    <!-- Favicon — PNG for all modern browsers -->
    <link rel="icon" type="image/png" href="/app-icon.png" />
    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <!-- Fallback SVG favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
