kind = "web"
previewPath = "/"
title = "NOCpulse"
version = "1.0.0"
id = "artifacts/nocpulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20969

[services.development]
run = "pnpm --filter @workspace/nocpulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nocpulse", "run", "build" ]
publicDir = "artifacts/nocpulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20969"
BASE_PATH = "/"
